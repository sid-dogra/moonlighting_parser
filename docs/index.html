<body>

    <div class="info">
        Upload the Amion HTML exports and Trainees.xlsx to generate a moonlighting summary.
    </div>

    <div class="upload-section">

        <div class="file-input-wrapper">

    <div id="output">
        <h3>Summary</h3>
        <pre id="summaryText"></pre>
        <button class="download-btn" id="downloadBtn">Download Summary (.txt)</button>

    <script>
// =============================================================================
// SHIFT MAPPINGS: Amion shift names → [display_name, hours]
// =============================================================================

    "Scanner Coverage - CC Weekend 8a-4p": ["Cancer Center weekend 8A-4PM", 8],
    "Scanner Coverage - CC Weekend 8:30a-4p": ["Cancer Center weekend", 7.5],
};

const CONTRAST_SHIFT_MAPPINGS = {
    // Fellow early shifts
    "32nd Early (7a-8a)": ["7AM 32nd", 1],
    "CBI Early (7a-8a)": ["7AM CBI", 1],

    // Late shifts
    "32nd Late (5p-9p)": ["32nd Late", 4],
    "41st Late (5p-7p)": ["41st St late", 2],

    // Saturday shifts
    "32nd Sat (8a-4p)": ["32nd St weekend", 8],

    "CBI Sat (8a-4p)": ["CBI weekend", 8],
    "HCC Sat (9a-5p)": ["HCC weekend", 8],

    // Weekend coverage
    "53rd (8a-5p)": ["53rd St weekend", 9],
    "Gramercy (8a-5p)": ["Gramercy weekend", 9],
    "Midwood (8a-4p) 813 Quentin Rd (718) 832-1455": ["Midwood", 8],
    "Greenpoint (8a-4p) 74 Kent St (929) 455-3166": ["Greenpoint", 8],

    // FPO Weekend
    "FPO Weekend": ["FPO Weekend", 8],

    // Winthrop
    "Winthrrop Chest Weekend 8a-11a": ["Winthrop Chest", 3],
    "Winthrop Peds Call Week": ["Winthrop Peds", 8],

    // LID
    "LID Sunday (Use Amion LID Set 24 Sunday Rules)": ["LID Sunday", 8],
    "LID Weekday C+ Coverage": ["LID Weekday", 4],

    // Premier Fellow
    "Premier Fellow": ["Premier", 1],
};

const NAME_ALIASES = {
    "Young Joon Kwon": "Fred Kwon",
    "Lillian Chiu-Kennedy": "Lillian Chiu",
};

// =============================================================================
// STATE
// =============================================================================

let traineesData = null;  // { residents: Set, fellows: Set, all: Set }
let residencyHtml = null;
let contrastHtml = null;

// =============================================================================
// HELPER FUNCTIONS
// =============================================================================

function normalizeName(name) {
    if (!name) return null;

    name = name.trim();
    name = name.replace(/\s+/g, ' ');
    name = name.replace(/\u00A0/g, ' ');  // non-breaking space

    // Handle "Last, First" format
    if (name.includes(',')) {
        const parts = name.split(',', 2);
        if (parts.length === 2) {
            const last = parts[0].trim();
            const first = parts[1].trim();
            name = `${first} ${last}`;
        }
    }

    // Apply aliases
    if (NAME_ALIASES[name]) {
        name = NAME_ALIASES[name];
    }

    return name;
}

function parseDateHeader(dateStr, year = 2026) {
    dateStr = dateStr.trim().replace(/\s+/g, '');

    const match = dateStr.match(/(\d{1,2})[-\/](\d{1,2})/);
    if (match) {
        const month = parseInt(match[1], 10) - 1;  // JS months are 0-indexed
        const day = parseInt(match[2], 10);
        try {
            return new Date(year, month, day);
        } catch (e) {
            return null;
        }
    }
    return null;
}

function formatDate(date) {
    const mm = String(date.getMonth() + 1).padStart(2, '0');
    const dd = String(date.getDate()).padStart(2, '0');
    const yyyy = date.getFullYear();
    return `${mm}-${dd}-${yyyy}`;
}

function buildAbbreviationMap(doc) {
    const abbrevMap = {};
    const sampleCells = [];  // Debug: collect sample cells

    const tables = doc.querySelectorAll('table');
    for (const table of tables) {
        const cells = table.querySelectorAll('td, th');
        for (const cell of cells) {
            let cellText = cell.textContent.trim();

            if (cellText.length < 4) continue;

            // Debug: collect first 10 cells that might be name+abbrev
            if (sampleCells.length < 10 && cellText.length > 6 && cellText.length < 50) {
                sampleCells.push(cellText.substring(0, 40));
            }

            // Strip phone numbers
            cellText = cellText.replace(/\d{3}[-.]?\d{3}[-.]?\d{4}.*$/, '');
            cellText = cellText.replace(/\d{3}-\d{3}-\d{4}.*$/, '');

            // Pattern: name ending with lowercase, then abbreviation
            let match = cellText.match(/^(.+?[a-z])\s*([A-Z][A-Za-z]?[a-z]?)$/);
            if (match) {
                const fullName = match[1].trim();
                const abbrev = match[2];
                if (abbrev.length >= 2 && fullName.length > 3 && (fullName.includes(' ') || fullName.includes(','))) {
                    const normalized = normalizeName(fullName);
                    if (normalized) abbrevMap[abbrev] = normalized;
                }
                continue;
            }

            match = cellText.match(/^(.+[a-z])([A-Z]{2,4})$/);
            if (match) {
                const fullName = match[1].trim();
                const abbrev = match[2];
                if (fullName.length > 3 && (fullName.includes(' ') || fullName.includes(','))) {
                    const normalized = normalizeName(fullName);
                    if (normalized) abbrevMap[abbrev] = normalized;
                }
                continue;
            }

            match = cellText.match(/^(.+[a-z])([A-Z][A-Za-z]{1,2})$/);
            if (match) {
                const fullName = match[1].trim();
                const abbrev = match[2];
                if (fullName.length > 3 && (fullName.includes(' ') || fullName.includes(','))) {
                    const normalized = normalizeName(fullName);
                    if (normalized) abbrevMap[abbrev] = normalized;
                }
            }
        }
    }

    // Debug: store sample cells
    window._abbrevDebug = { sampleCells, totalCellsChecked: 0 };

    return abbrevMap;
}

function extractYearFromFilename(filename) {
    const match = filename.match(/(\d{4})/);
    return match ? parseInt(match[1], 10) : 2026;
}

// =============================================================================
// PARSING FUNCTIONS
// =============================================================================

function parseResidencySchedule(htmlString, trainees, year = 2026) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(htmlString, 'text/html');

    const results = [];
    const tables = doc.querySelectorAll('table');

    // Collect all candidate tables (matching Python logic exactly)
    const candidates = [];

    for (const table of tables) {
        const rows = table.querySelectorAll('tr');
        if (rows.length < 10) continue;

        const firstRow = rows[0];
        const firstCells = firstRow.querySelectorAll('td, th');
        const firstTexts = Array.from(firstCells).map(c => c.textContent.trim());

        const hasShiftHeaders = firstTexts.some(t => t.includes('ECEP') || t.includes('Scanner Coverage'));
        if (!hasShiftHeaders) continue;

        let dataRowCount = 0;
        for (let i = 1; i < rows.length; i++) {
            const cells = rows[i].querySelectorAll('td, th');
            if (cells.length > 0) {
                const firstText = cells[0].textContent.trim();
                if (/\d+[-\/]\d+/.test(firstText)) {
                    dataRowCount++;
                }
            }
        }

        // Check if first column header is clean (matches Python logic)
        const firstHeader = firstTexts[0] || '';
        const isClean = firstHeader === '' || firstHeader.startsWith('ECEP');

        candidates.push({
            dataRowCount,
            isClean: isClean ? 1 : 0,
            rowCount: rows.length,
            rows,
            shiftColumns: firstTexts
        });
    }

    // Sort by: most data rows, then clean headers, then fewest total rows (Python logic)
    candidates.sort((a, b) => {
        if (b.dataRowCount !== a.dataRowCount) return b.dataRowCount - a.dataRowCount;
        if (b.isClean !== a.isClean) return b.isClean - a.isClean;
        return a.rowCount - b.rowCount;
    });

    if (candidates.length === 0) return results;

    const bestTable = candidates[0].rows;
    const bestShiftColumns = candidates[0].shiftColumns;

    if (!bestTable) return results;

    for (let i = 1; i < bestTable.length; i++) {
        const row = bestTable[i];
        const cells = row.querySelectorAll('td, th');
        const cellTexts = Array.from(cells).map(c => c.textContent.trim());

        if (cellTexts.length === 0) continue;

        const dateStr = cellTexts[0];
        const date = parseDateHeader(dateStr, year);
        if (!date) continue;

        for (let colIdx = 1; colIdx < cellTexts.length; colIdx++) {
            if (colIdx >= bestShiftColumns.length) break;

            const shiftName = bestShiftColumns[colIdx];
            if (!shiftName || shiftName === '-') continue;

            let personName = cellTexts[colIdx].trim();
            if (!personName || personName === '-') continue;

            const normalizedName = normalizeName(personName);
            if (!normalizedName) continue;

            if (!trainees.has(normalizedName)) continue;

            if (RESIDENCY_SHIFT_MAPPINGS[shiftName]) {
                const [displayName, hours] = RESIDENCY_SHIFT_MAPPINGS[shiftName];
                results.push({ date, shift: displayName, person: normalizedName, hours });
            }
        }
    }

    return results;
}

function parseContrastSchedule(htmlString, trainees, fellows, year = 2026) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(htmlString, 'text/html');

    const results = [];
    const abbrevMap = buildAbbreviationMap(doc);

    // Debug info
    window._contrastDebug = {
        abbrevMapSize: Object.keys(abbrevMap).length,
        traineesSize: trainees.size,
        fellowsSize: fellows.size,
        tablesFound: 0,
        tableWithDates: false,
        headerRowIdx: -1,
        dateColumnsCount: 0,
        shiftsProcessed: 0,
        peopleMatched: 0
    };

    const tables = doc.querySelectorAll('table');
    window._contrastDebug.tablesFound = tables.length;

    for (const table of tables) {
        const rows = table.querySelectorAll('tr');
        if (rows.length < 10) continue;

        // Find header row with dates
        let dateColumns = [];
        let headerRowIdx = -1;

        for (let idx = 0; idx < rows.length; idx++) {
            const cells = rows[idx].querySelectorAll('td, th');
            const cellTexts = Array.from(cells).map(c => c.textContent.trim());

            const hasDates = cellTexts.slice(1, 5).some(t => /\d+-\d+/.test(t) || /\d+\/\d+/.test(t));
            if (hasDates) {
                headerRowIdx = idx;
                dateColumns = cellTexts;
                break;
            }
        }

        if (dateColumns.length === 0 || headerRowIdx < 0) continue;

        window._contrastDebug.tableWithDates = true;
        window._contrastDebug.headerRowIdx = headerRowIdx;
        window._contrastDebug.dateColumnsCount = dateColumns.length;

        // Parse dates
        const dates = dateColumns.map(d => parseDateHeader(d, year));
        window._contrastDebug.validDates = dates.filter(d => d !== null).length;

        // Parse data rows
        for (let i = headerRowIdx + 1; i < rows.length; i++) {
            const row = rows[i];
            const cells = row.querySelectorAll('td, th');
            const cellTexts = Array.from(cells).map(c => c.textContent.trim());

            if (cellTexts.length === 0) continue;

            let shiftName = cellTexts[0].replace(/\u00A0/g, ' ');
            if (!shiftName) continue;

            // Skip non-shift rows
            if (/^(Mon|Tue|Wed|Thu|Fri|Sat|Sun|20|7:30)/.test(shiftName)) continue;
            if (shiftName.includes('Doximity') || shiftName.includes('GPT')) continue;

            // Find shift info
            let shiftInfo = CONTRAST_SHIFT_MAPPINGS[shiftName];
            if (!shiftInfo) {
                for (const key of Object.keys(CONTRAST_SHIFT_MAPPINGS)) {
                    if (shiftName.startsWith(key)) {
                        shiftInfo = CONTRAST_SHIFT_MAPPINGS[key];
                        break;
                    }
                }
            }

            if (!shiftInfo) continue;

            window._contrastDebug.shiftsProcessed++;
            const [displayName, hours] = shiftInfo;

            // Day-of-week restrictions
            const saturdayOnly = shiftName.includes('Sat') && shiftName.split('(')[0].includes('Sat');
            const sundayOnly = shiftName.includes('Sunday');
            const weekdayOnly = shiftName.includes('41st Late');

            // Parse each date column
            for (let colIdx = 1; colIdx < cellTexts.length; colIdx++) {
                if (colIdx >= dates.length || !dates[colIdx]) continue;

                const dayOfWeek = dates[colIdx].getDay();  // 0=Sun, 6=Sat

                if (saturdayOnly && dayOfWeek !== 6) continue;
                if (sundayOnly && dayOfWeek !== 0) continue;
                if (weekdayOnly && (dayOfWeek === 0 || dayOfWeek === 6)) continue;

                let abbrev = cellTexts[colIdx].trim();
                if (!abbrev || abbrev === '-') continue;

                // Look up full name
                let fullName = abbrevMap[abbrev];
                if (!fullName) {
                    for (const [key, value] of Object.entries(abbrevMap)) {
                        if (key.startsWith(abbrev) || abbrev.startsWith(key)) {
                            fullName = value;
                            break;
                        }
                    }
                }

                if (!fullName) continue;
                if (!trainees.has(fullName)) continue;

                // Premier Fellow only for fellows
                if (shiftName.includes('Premier') && !fellows.has(fullName)) continue;

                window._contrastDebug.peopleMatched++;
                results.push({ date: dates[colIdx], shift: displayName, person: fullName, hours });
            }
        }

        console.log('Contrast results from this table:', results.length);
        break;  // Only process first matching table
    }

    return results;
}

function generateSummary(entries, monthName) {
    // Group by person
    const byPerson = {};
    for (const entry of entries) {
        if (!byPerson[entry.person]) {
            byPerson[entry.person] = [];
        }
        byPerson[entry.person].push(entry);
    }

    const lines = [];
    lines.push(`${monthName} Moonlighting Summary`);
    lines.push('='.repeat(50));
    lines.push('');

    const sortedPeople = Object.keys(byPerson).sort();

    for (const person of sortedPeople) {
        const shifts = byPerson[person];
        shifts.sort((a, b) => a.date - b.date);

        lines.push(person);
        let totalHours = 0;

        for (const { date, shift, hours } of shifts) {
            const dateStr = formatDate(date);
            lines.push(`  ${dateStr} ${shift.padEnd(25)} ${hours}`);
            totalHours += hours;
        }

        lines.push(`  ${'Total:'.padEnd(36)} ${totalHours}`);
        lines.push('');
    }

    return lines.join('\n');
}

// =============================================================================
// FILE HANDLING
// =============================================================================

function readFileAsText(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.onerror = e => reject(e);
        reader.readAsText(file);
    });
}

function readFileAsArrayBuffer(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.onerror = e => reject(e);
        reader.readAsArrayBuffer(file);
    });
}

async function parseTraineesFile(file) {
    const data = await readFileAsArrayBuffer(file);
    const workbook = XLSX.read(data, { type: 'array' });
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(sheet);

    const residents = new Set();
    const fellows = new Set();

    for (const row of json) {
        if (row['Residents']) {
            residents.add(row['Residents'].trim());
        }
        if (row['Fellows']) {
            fellows.add(row['Fellows'].trim());
        }
    }

    const all = new Set([...residents, ...fellows]);

    return { residents, fellows, all };
}

function updateButtonState() {
    const btn = document.getElementById('parseBtn');
    const hasTrainees = traineesData !== null;
    const hasAtLeastOneHtml = residencyHtml !== null || contrastHtml !== null;

    btn.disabled = !(hasTrainees && hasAtLeastOneHtml);
}

// =============================================================================
// EVENT HANDLERS
// =============================================================================

document.getElementById('traineesFile').addEventListener('change', async function(e) {
    const file = e.target.files[0];
    const status = document.getElementById('traineesStatus');

    if (!file) {
        traineesData = null;
        status.textContent = 'No file selected';
        status.classList.remove('loaded');
        updateButtonState();
        return;
    }

    try {
        traineesData = await parseTraineesFile(file);
        status.textContent = `Loaded: ${traineesData.residents.size} residents, ${traineesData.fellows.size} fellows`;
        status.classList.add('loaded');
    } catch (err) {
        status.textContent = 'Error loading file: ' + err.message;
        status.classList.remove('loaded');
        traineesData = null;
    }

    updateButtonState();
});

document.getElementById('residencyFile').addEventListener('change', async function(e) {
    const file = e.target.files[0];
    const status = document.getElementById('residencyStatus');

    if (!file) {
        residencyHtml = null;
        status.textContent = 'No file selected';
        status.classList.remove('loaded');
        updateButtonState();
        return;
    }

    try {
        residencyHtml = { content: await readFileAsText(file), filename: file.name };
        status.textContent = `Loaded: ${file.name}`;
        status.classList.add('loaded');

        // Try to auto-detect month from filename
        const monthMatch = file.name.match(/(January|February|March|April|May|June|July|August|September|October|November|December)/i);
        if (monthMatch && !document.getElementById('monthName').value) {
            document.getElementById('monthName').value = monthMatch[1];
        }
    } catch (err) {
        status.textContent = 'Error loading file: ' + err.message;
        status.classList.remove('loaded');
        residencyHtml = null;
    }

    updateButtonState();
});

document.getElementById('contrastFile').addEventListener('change', async function(e) {
    const file = e.target.files[0];
    const status = document.getElementById('contrastStatus');

    if (!file) {
        contrastHtml = null;
        status.textContent = 'No file selected';
        status.classList.remove('loaded');
        updateButtonState();
        return;
    }

    try {
        contrastHtml = { content: await readFileAsText(file), filename: file.name };
        status.textContent = `Loaded: ${file.name}`;
        status.classList.add('loaded');

        // Try to auto-detect month from filename
        const monthMatch = file.name.match(/(January|February|March|April|May|June|July|August|September|October|November|December)/i);
        if (monthMatch && !document.getElementById('monthName').value) {
            document.getElementById('monthName').value = monthMatch[1];
        }
    } catch (err) {
        status.textContent = 'Error loading file: ' + err.message;
        status.classList.remove('loaded');
        contrastHtml = null;
    }

    updateButtonState();
});

document.getElementById('parseBtn').addEventListener('click', function() {
    const errorDiv = document.getElementById('errorMsg');
    errorDiv.innerHTML = '';

    const monthName = document.getElementById('monthName').value || 'Monthly';

    try {
        let year = 2026;
        if (residencyHtml) {
            year = extractYearFromFilename(residencyHtml.filename);
        } else if (contrastHtml) {
            year = extractYearFromFilename(contrastHtml.filename);
        }

        const allEntries = [];

        let statusMsg = [];

        // Parse Residency Schedule
        if (residencyHtml) {
            const entries = parseResidencySchedule(residencyHtml.content, traineesData.all, year);
            statusMsg.push(`Residency: ${entries.length} shifts`);
            allEntries.push(...entries);
        } else {
            statusMsg.push('Residency: not uploaded');
        }

        // Parse Contrast Schedule
        if (contrastHtml) {
            const entries = parseContrastSchedule(contrastHtml.content, traineesData.all, traineesData.fellows, year);
            statusMsg.push(`Contrast: ${entries.length} shifts`);
            allEntries.push(...entries);
        } else {
            statusMsg.push('Contrast: not uploaded');
        }

        // Show parsing status with debug info
        let debugInfo = '';
        if (window._contrastDebug) {
            const d = window._contrastDebug;
            debugInfo = `\n\nContrast Debug:\n` +
                `- Abbrev map: ${d.abbrevMapSize}\n` +
                `- Trainees: ${d.traineesSize}, Fellows: ${d.fellowsSize}\n` +
                `- Tables: ${d.tablesFound}\n` +
                `- Found table with dates: ${d.tableWithDates}\n` +
                `- Header row: ${d.headerRowIdx}, Date cols: ${d.dateColumnsCount}\n` +
                `- Valid dates: ${d.validDates || 0}\n` +
                `- Shifts processed: ${d.shiftsProcessed}\n` +
                `- People matched: ${d.peopleMatched}`;
        }
        if (window._abbrevDebug && window._abbrevDebug.sampleCells) {
            debugInfo += `\n\nSample cells:\n${window._abbrevDebug.sampleCells.join('\n')}`;
        }
        alert('Parsing complete:\n' + statusMsg.join('\n') + '\nTotal: ' + allEntries.length + ' shifts' + debugInfo);

        // Remove duplicates
        const seen = new Set();
        const uniqueEntries = [];
        for (const entry of allEntries) {
            const key = `${entry.date.getTime()}-${entry.shift}-${entry.person}`;
            if (!seen.has(key)) {
                seen.add(key);
                uniqueEntries.push(entry);
            }
        }

        // Generate summary
        const summary = generateSummary(uniqueEntries, monthName);

        // Display
        document.getElementById('summaryText').textContent = summary;
        document.getElementById('output').style.display = 'block';

        // Store for download
        window.currentSummary = summary;
        window.currentMonthName = monthName;

    } catch (err) {
        errorDiv.innerHTML = `<div class="error">Error: ${err.message}</div>`;
        console.error(err);
    }
});

document.getElementById('downloadBtn').addEventListener('click', function() {
    const summary = window.currentSummary;
    const monthName = window.currentMonthName || 'Monthly';

    const blob = new Blob([summary], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);

    const a = document.createElement('a');
    a.href = url;
    a.download = `${monthName}_Trainee_Summary.txt`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
});
    </script>
</body>
